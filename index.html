    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

        line-height: 1.6;
        overflow-x: hidden;
    }

    /* ヘッダー */

        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 1000;
    }

    .site-logo {
        display: flex;

        text-decoration: none;

        font-size: 16px;

    .logo-img {

        object-fit: contain;

        border-radius: 4px;

    }

    .logo-kicker {

        color: #666;

    .menu-link {

        padding: 8px 16px;

        transition: background 0.2s;
    }
    .menu-link:hover { background: #f0f0f0; }

    /* ヒーローエリア */
    .hero {
        position: relative;
        height: 100vh;

        align-items: center;

    }

    .hero-title {

    /* 認証カード */

        background: rgba(6, 18, 34, 0.68);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.24);
        padding: 40px;
        border-radius: 16px;
        width: 100%;

        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
        transition: transform 0.3s;

    .auth-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #fff; }

    .passcode-area { display: flex; flex-direction: column; gap: 15px; }
    
    .passcode-input {
        width: 100%; padding: 12px 15px; font-size: 16px; border: none;
        border-radius: 8px; background: rgba(255,255,255,0.95);
        color: #333; text-align: center; letter-spacing: 3px;
    }
    .passcode-input:focus { outline: 3px solid var(--accent-blue); }

    .btn-unlock {
        background: var(--accent-blue); color: white; font-weight: bold;
        padding: 12px; border: none; border-radius: 8px; font-size: 16px;
        cursor: pointer; transition: background 0.2s; width: 100%;
    }
    .btn-unlock:hover { background: var(--accent-hover); }

    .error-msg {
        color: #ff5252; font-size: 13px; font-weight: bold;
        display: none; margin-top: 5px; text-shadow: 0 1px 2px rgba(0,0,0,0.8);

    /* ボタンのみ版のデザイン（コメントアウト中） */
    .glass-card {

    .glass-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.95); }
    .card-icon { font-size: 40px; margin-bottom: 15px; background: #e3f2fd; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent-blue); }
    .card-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--accent-blue); }
    .card-desc { font-size: 14px; color: #555; margin-bottom: 25px; }
    .action-btn { background: var(--accent-blue); color: white; padding: 12px 40px; border-radius: 30px; font-weight: bold; display: flex; align-items: center; gap: 8px; }

    /* フッター */
    footer {
        position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px;
        text-align: center; color: rgba(255,255,255,0.7); font-size: 11px; z-index: 10;

    }
    footer a { color: rgba(255,255,255,0.9); text-decoration: none; margin: 0 10px; }

    @media (max-width: 768px) { .hero-title { font-size: 1.8rem; } }

</head>
<body>

<header>
    <a href="index.html" class="site-logo">
        <img src="heli_illust.png" alt="鹿児島県ドクターヘリ基地病院ロゴ" class="logo-img">
        <div>
            <div class="logo-kicker">施設間搬送要請支援</div>
            <div class="logo-title">鹿児島県ドクターヘリ基地病院</div>
        </div>
    </a>
    <nav>
        <a href="利用規約.html" class="menu-link">規約・ポリシー</a>
    </nav>
</header>

<section class="hero">
    <video class="hero-video" autoplay muted loop playsinline poster="20260101heli.png">
        <source src="heli_movie.mp4" type="video/mp4">
        <img src="20260101heli.png" alt="" style="width:100%; height:100%; object-fit:cover;">
    </video>
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h1 class="hero-title">施設間搬送要請ポータル</h1>
        <p class="hero-subtitle">鹿児島県内の医療機関向け<br>施設間搬送・ドクターヘリ要請入口</p>

        <div class="auth-card">
            <div class="auth-title">🔒 関係者認証 (Medical Auth)</div>
            <p style="font-size:13px; margin-bottom:15px; color:#ddd;">
                搬送要請フォームへ進むには、共有パスコードを入力してください。
            </p>
            
            <div class="passcode-area">
                <input type="password" id="passcodeInput" class="passcode-input" placeholder="Passcode" aria-label="共有パスコード" aria-describedby="errorMsg" autocomplete="off" inputmode="numeric">
                <div id="errorMsg" class="error-msg" aria-live="polite">⚠ パスコードが間違っています</div>
                <button type="button" id="unlockButton" class="btn-unlock">認証して進む ➜</button>
            </div>
        </div>

        </div>
</section>

<footer>
    <div>&copy; 2026 Kagoshima Doctor Heli Base Hospital</div>
    <div style="margin-top:5px;">
        <a href="利用規約.html#terms">利用規約</a> | 
        <a href="利用規約.html#privacy">プライバシーポリシー</a> | 
        <a href="利用規約.html#security">セキュリティ指針</a>
    </div>
</footer>

<script>
    // ==========================================
    // 【設定】パスコード照合
    // ==========================================
    const SECRET_HASH = "888df25ae35772424a560c7152a1de794440e0ea5cfee62828333a456a506e05";
    const LINK_URL = "施設間.html";

    async function sha256Hex(text) {
        const data = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer))
            .map(byte => byte.toString(16).padStart(2, '0'))
            .join('');
    }

    async function checkPasscode() {
        const input = document.getElementById('passcodeInput');
        const error = document.getElementById('errorMsg');
        const btn = document.getElementById('unlockButton');
        const inputHash = await sha256Hex(input.value);

        if (inputHash === SECRET_HASH) {
            // 正解
            error.style.display = 'none';
            input.style.borderColor = '#4caf50';
            btn.textContent = "認証成功...移動中";
            btn.style.background = "#4caf50";
            setTimeout(() => { window.location.href = LINK_URL; }, 500);
        } else {
            // 不正解
            error.style.display = 'block';
            input.value = "";
            input.focus();
            // 振動エフェクト
            const card = document.querySelector('.auth-card');
            card.style.transform = "translateX(5px)";
            setTimeout(() => card.style.transform = "translateX(-5px)", 50);
            setTimeout(() => card.style.transform = "translateY(0)", 100);
        }
    }

    document.getElementById('unlockButton').addEventListener('click', checkPasscode);
    document.getElementById('passcodeInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkPasscode();
    });
</script>

</body>
